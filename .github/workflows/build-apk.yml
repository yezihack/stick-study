name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Generate splash screens
        run: npm run gen:splash

      - name: Capacitor sync
        run: npm run cap:sync

      - name: Restore keystore (release only)
        if: env.BUILD_TYPE == 'release'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: |
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK")" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: 守习 Stick Study ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## 守习 · Stick Study ${{ github.ref_name }}

            一款离线优先的每日学习打卡工具（Vue 3 + Capacitor）。

            ### 📥 下载安装
            - 下载下方的 `${{ steps.apk.outputs.name }}`
            - 在 Android 设备上允许「安装未知来源应用」后点击安装
            - 最低系统要求：Android 7.0（API 24）及以上

            ### ℹ️ 说明
            - 数据 100% 存储在本地，无需注册、不上传任何数据
            - 支持 简体中文 / English / 日本語

            ---
            完整功能介绍见 [README](https://github.com/yezihack/stick-study#readme)。
          files: ${{ steps.apk.outputs.path }}
